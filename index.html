<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>出发！为了拯救这个世界！ - Let's Go! To Save the World!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1815;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #ui-overlay > * {
      pointer-events: auto;
    }

    #ui-overlay .ui-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 24, 21, 0.95);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #ui-overlay .ui-panel::-webkit-scrollbar {
      width: 3px;
    }

    #ui-overlay .ui-panel::-webkit-scrollbar-thumb {
      background: rgba(212, 165, 116, 0.3);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!-- DOM UI 覆盖层：用于复杂UI界面（商店、背包、任务等） -->
  <div id="ui-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
